  element2:
    name: Use Unique Passwords
    requirements:
    - Where multi-factor authentication is not supported (such as local administrator,
      root, or service accounts), accounts will use passwords that are unique to that
      system.
    - Rationale: The ability to create pods in a cluster opens up possibilities for
        privilege escalation and should be restricted, where possible.
    - Impact: Care should be taken not to remove access to pods to system components
        which require this for their operation.
    - Audit: Review the users who have create access to pod objects in the Kubernetes
        API.
    - Remediation: Where possible, remove create access to pod objects in the cluster.
    - Default Value: By default, the following list of principals have create privileges
        on pod objects
  element3:
    name: Minimize access to create pods (Manual)
    requirements:
    - Level 1
    - Description: The ability to create pods in a namespace can provide a number
        of opportunities for privilege escalation, such as assigning privileged service
        accounts to these pods or mounting hostPaths with access to sensitive data
        unless Pod Security Policies are implemented to restrict this access.
    - Rationale: The ability to create pods in a cluster opens up possibilities for
        privilege escalation and should be restricted, where possible.
    - Impact: All workloads which require access to the Kubernetes API will require
        an explicit service account to be created.
    - Audit: Review the users who have create access to pod objects in the Kubernetes
        API.
    - Remediation: Where possible, remove create access to pod objects in the cluster.
    - Default Value: By default, the following list of principals have create privileges
        on pod objects
  element4:
    name: Ensure that default service accounts are not actively used.
    requirements:
    - Level 1
    - Description: The default service account should not be used to ensure that rights
        granted to applications can be more easily audited and reviewed.
    - Rationale: Kubernetes provides a default service account which is used by cluster
        workloads where no specific service account is assigned to the pod.
    - Impact: All workloads which require access to the Kubernetes API will require
        an explicit service account to be created.
    - Audit: For each namespace in the cluster, review the rights assigned to the
        default service account and ensure that it has no roles or cluster roles bound
        to it apart from the defaults.
    - Additionally ensure that the automountServiceAccountToken: false setting is
        in place for each default service account.
    - Remediation: Create explicit service accounts wherever a Kubernetes workload
        requires specific access to the Kubernetes API server.
    - Default Value: By default the default service account allows for its service
        account token to be mounted in pods in its namespace.
  element5:
    name: Limit access to scripting tools
    requirements:
    - Level 1
    - Description: Limit access to scripting tools (such as Microsoft PowerShell and
        Python) to only administrative or development users with the need to access
        those capabilities.
    - Rationale: The ability to create pods in a cluster opens up possibilities for
        privilege escalation and should be restricted, where possible.
    - Impact: All workloads which require access to the Kubernetes API will require
        an explicit service account to be created.
    - Audit: For each namespace in the cluster, review the rights assigned to the
        default service account and ensure that it has no roles or cluster roles bound
        to it apart from the defaults.
    - Additionally ensure that the automountServiceAccountToken: false setting is
        in place for each default service account.
    - Remediation: Create explicit service accounts
  element6:
    name: Authentication and Authorization
    requirements:
    - Manage Kubernetes RBAC users with AWS IAM Authenticator for Kubernetes

