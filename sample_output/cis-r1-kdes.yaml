  element2:
    name: Use Unique Passwords
    requirements:
    - Where multi-factor authentication is not supported (such as local administrator,
      root, or service accounts), accounts will use passwords that are unique to that
      system.
    - Rationale: The ability to create pods in a cluster opens up possibilities for
        privilege escalation and should be restricted, where possible.
    - Impact: Careful should be taken not to remove access to pods to system components
        which require this for their operation
    - Audit: Review the users who have create access to pod objects in the Kubernetes
        API.
    - Remediation: Where possible, remove create access to pod objects in the cluster.
    - Default Value: By default, the following list of principals have create privileges
        on pod objects
  element3:
    name: Minimize access to create pods (Manual)
    requirements:
    - Profile Applicability: Level 1
    - Description: The ability to create pods in a namespace can provide a number
        of opportunities for privilege escalation, such as assigning privileged service
        accounts to these pods or mounting hostPaths with access to sensitive data
        unless Pod Security Policies are implemented to restrict this access
    - Rationale: The ability to create pods in a cluster opens up possibilities for
        privilege escalation and should be restricted, where possible.
    - Impact: Careful should be taken not to remove access to pods to system components
        which require this for their operation
    - Audit: Review the users who have create access to pod objects in the Kubernetes
        API.
    - Remediation: Where possible, remove create access to pod objects in the cluster.
    - Default Value: By default, the following list of principals have create privileges
        on pod objects
  element4:
    audit:
    - Review the users who have get, list or watch access to secrets objects in the
      Kubernetes API.
    name: RBAC and Service Accounts
    remediation:
    - Remove get, list and watch access to secret objects in the cluster.
    - Default Value: By default, the following list of principals have get privileges
        on secret objects
    requirements:
    - Ensure that the cluster-admin role is only used where and when needed (Manual)
    - Profile Applicability:
      - Level 1
      - Ensure that the RBAC role cluster-admin provides wide-ranging powers over
        the environment and should be used only where and when needed.
    - Ensure that all users with administrative account access use a dedicated or
      secondary account for elevated activities.
    - Default Value: By default, a single clusterrolebinding called cluster-admin
        is provided with the system:masters group as its principal.
  element5:
    audit:
    - Review the users who have get, list or watch access to secrets objects in the
      Kubernetes API.
    name: Restrict Administrator Privileges to Dedicated Administrator Accounts
    remediation:
    - Remove get, list and watch access to secret objects in the cluster.
    - Default Value: By default, the following list of principals have get privileges
        on secret objects
    requirements:
    - Minimize access to secrets, such as service account tokens for the Kubernetes
      API or credentials used by workloads in the cluster.
    - "Conduct general computing activities, such as internet browsing, email, and\
      \ productivity suite use, from the user\u2019s primary, non-privileged account."
    - Default Value: By default, the following list of principals have get privileges
        on secret objects
  element6:
    audit:
    - Review the users who have get, list or watch access to secrets objects in the
      Kubernetes API.
    name: Minimize Access to Secrets
    requirements:
    - Manual
    - Minimize access to secrets
    - Review users who have get, list or watch access to secret objects in the Kubernetes
      API
    - Remove get, list and watch access to secret objects in the cluster.
    - Default Value: By default, the following list of principals have get privileges
        on secret objects
  element7:
    name: Apply Security Context to Your Pods and Containers
    requirements:
    - Manual: Apply Security Context to Your Pods and Containers.
  element8:
    name: The default namespace should not be used
    requirements:
    - Manual: The default namespace should not be used.

